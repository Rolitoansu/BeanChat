<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf9f5]">
    <div class="flex flex-col items-center justify-center mt-16 gap-3">
        <h1 class="text-5xl font-bold">Bean Chat</h1>
        <p class="">Your daily brew of connection</p>
        <form class="flex flex-col gap-4" method="post" action="/login">
            <div class="flex flex-col gap-2">
                <label class="" for="email">Email or username</label>
                <input class="px-4 py-1 rounded-full" name="email" id="email" autocomplete="true">
            </div>
            <div class="flex flex-col gap-2">
                <label class="" for="password">Password</label>
                <input class="px-4 py-1 rounded-full" name="password" id="password" type=password>
            </div>
            <button class="px-4 py-1 rounded-full bg-black text-white" type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
