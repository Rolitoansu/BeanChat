<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf9f5]">
    <div class="flex flex-col items-center justify-center mt-16 gap-3">
        <h1 class="text-5xl font-bold">Bean Chat</h1>
        <p class="">Your daily brew of connection</p>
        <form class="flex flex-col gap-4" method="post" action="/signup" th:object="${signUpFormDto}">
            <div class="flex flex-col gap-2">
                <label class="" for="email">Email</label>
                <input class="px-4 py-1 rounded-full" th:field="*{email}" id="email" type="email" autocomplete="email">
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600"></span>
            </div>
            <div class="flex flex-col gap-2">
                <label class="" for="password">Password</label>
                <input class="px-4 py-1 rounded-full" th:field="*{password}" id="password" type="password">
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-600"></span>
            </div>
            <div class="flex flex-col gap-2">
                <label class="" for="repeatPassword">Repeat Password</label>
                <input class="px-4 py-1 rounded-full" th:field="*{repeatPassword}" id="repeatPassword" type="password">
                <span th:if="${#fields.hasErrors('repeatPassword')}" th:errors="*{repeatPassword}" class="text-red-600">Repeat Password Error</span>
            </div>
            <button class="px-4 py-1 rounded-full bg-black text-white" type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
